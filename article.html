<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article | Guide Mondial 2026</title>
  <meta name="description" content="Article Coupe du Monde 2026 sur Guide Mondial 2026." />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/favicon.png" />
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at top,#0d2d4d,#050914 48%,#03060c);color:#eaf5ff;min-height:100vh}.wrap{width:min(100% - 28px,980px);margin:auto;padding:18px 0 42px}.panel{background:#061426d9;border:1px solid #ffffff14;border-radius:24px;box-shadow:0 18px 50px #00000030}.header{display:flex;justify-content:space-between;align-items:center;gap:18px;padding:14px 18px;position:sticky;top:10px;z-index:10;backdrop-filter:blur(14px)}.brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:#fff;font-weight:950}.brand img{width:50px;height:50px}.nav{display:flex;gap:10px;flex-wrap:wrap}.nav a{color:#dcecff;text-decoration:none;font-weight:900;padding:10px 12px;border-radius:14px;background:#ffffff0a}.back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;border:1px solid #ffffff22;background:#ffffff0d;border-radius:14px;padding:10px 13px;font-weight:900;color:#fff}.article{margin-top:18px;padding:28px}.cat{display:inline-flex;background:#ffd166;color:#061426;padding:8px 12px;border-radius:999px;font-weight:950;text-transform:uppercase;font-size:12px;letter-spacing:.05em}h1{font-size:clamp(38px,6vw,72px);line-height:.93;margin:18px 0 12px}.meta{color:#8fa6bd;font-weight:800}.excerpt{font-size:20px;color:#c8d8e8;line-height:1.6;margin:24px 0}.content{font-size:18px;line-height:1.8;color:#e4eef8}.content h2{font-size:30px;margin-top:34px;color:#fff}.content h3{font-size:24px;color:#fff}.content p{margin:16px 0}.content ul,.content ol{padding-left:24px}.content li{margin:8px 0}.content a{color:#ffd166}.cta{margin-top:28px;padding:20px;border-radius:20px;background:linear-gradient(135deg,#ffd166,#ffb703);color:#061426}.cta a{color:#061426;font-weight:950}.footer{margin-top:28px;padding:18px;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;color:#adc0d2}.footer a{color:#dcecff;text-decoration:none;font-weight:900}@media(max-width:760px){.header{display:grid}.article{padding:22px 16px}.content{font-size:16px}}
  </style>
</head>
<body>
  <main class="wrap">
    <header class="header panel">
      <a class="brand" href="/"><img src="/guide-mondial-icon.svg" alt="Guide Mondial 2026"><span>Guide Mondial 2026</span></a>
      <nav class="nav"><a class="back" href="/actualites.html">← Retour aux actus</a><a class="back" href="/">Retour à l’application</a></nav>
    </header>
    <article class="article panel" id="articleBox"><p>Chargement de l’article...</p></article>
    <footer class="footer panel"><span>© 2026 Guide Mondial</span><span><a href="/actualites.html">Toutes les actus</a> · <a href="/guide.html">Guide complet</a> · <a href="/">Accueil</a></span></footer>
  </main>
  <script>
    const SUPABASE_URL='https://lclnnxirkuuwexxcmmho.supabase.co';
    const SUPABASE_KEY='sb_publishable_F-2bOXBmO23_FfRv5KTqXg_jP2osQM2';
    const box=document.getElementById('articleBox');
    const params=new URLSearchParams(location.search);
    const slug=params.get('slug')||'';
    const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    function formatDate(d){try{return new Intl.DateTimeFormat('fr-FR',{day:'2-digit',month:'long',year:'numeric'}).format(new Date(d))}catch(e){return ''}}
    function renderMarkdownLite(text){
      let s=esc(text||'');
      s=s.replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^## (.*)$/gm,'<h2>$1</h2>');
      s=s.split(/\n{2,}/).map(block=>{
        if(block.startsWith('<h2>')||block.startsWith('<h3>')) return block;
        if(block.trim().startsWith('- ')){return '<ul>'+block.split('\n').map(l=>l.replace(/^- (.*)/,'<li>$1</li>')).join('')+'</ul>'}
        return '<p>'+block.replace(/\n/g,'<br>')+'</p>';
      }).join('');
      return s;
    }
    async function load(){
      if(!slug){box.innerHTML='<h1>Article introuvable</h1><p>Aucun slug fourni.</p>';return;}
      try{
        const res=await fetch(`${SUPABASE_URL}/rest/v1/articles?select=*&slug=eq.${encodeURIComponent(slug)}&published=eq.true&limit=1`,{headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`},cache:'no-store'});
        if(!res.ok) throw new Error('Supabase '+res.status);
        const rows=await res.json();
        const a=rows[0];
        if(!a){box.innerHTML='<h1>Article introuvable</h1><p>Cet article n’est pas publié ou n’existe pas.</p>';return;}
        document.title=`${a.title} | Guide Mondial 2026`;
        document.querySelector('meta[name="description"]')?.setAttribute('content',a.excerpt||'Article Coupe du Monde 2026 sur Guide Mondial 2026.');
        const canonical=document.createElement('link');canonical.rel='canonical';canonical.href=`https://guidemondial2026.fr/article.html?slug=${encodeURIComponent(a.slug)}`;document.head.appendChild(canonical);
        box.innerHTML=`<span class="cat">${esc(a.category||'Actualité')}</span><h1>${esc(a.title)}</h1><div class="meta">Publié le ${formatDate(a.published_at||a.created_at)}</div><p class="excerpt">${esc(a.excerpt||'')}</p><div class="content">${renderMarkdownLite(a.content)}</div><div class="cta"><strong>À garder sous la main :</strong> consulte aussi le <a href="/">calendrier complet, le guide TV et les favoris</a> sur Guide Mondial 2026.</div>`;
      }catch(e){box.innerHTML='<h1>Article indisponible</h1><p>La page fonctionne, mais la table Supabase articles n’est pas encore disponible.</p>';}
    }
    load();
  </script>
</body>
</html>
